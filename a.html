<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Puzzle</title>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#board{
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(8,60px);
    grid-template-rows:repeat(8,60px);
    gap:2px;
    width:max-content;
}

.cell{
    width:60px;
    height:60px;
    border:1px solid #333;
    border-radius:10px;
    cursor:pointer;
}

.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:yellow;}
.purple{background:purple;}

.selected{
    outline:4px solid white;
}
</style>
</head>
<body>

<h2>Reverse Gravity Puzzle</h2>

<button id="editorBtn">エディタ</button>
<button id="startBtn">スタート</button>
<button id="saveBtn">A1保存</button>
<button id="loadBtn">A1読込</button>

<div id="moves">手数:20</div>

<div id="board"></div>

<script src="game.js"></script>

</body>
</html>
